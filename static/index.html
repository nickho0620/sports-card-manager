<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Card Manager</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card-thumb { width:100%; aspect-ratio:3/4; object-fit:cover; background:#1e293b; border-radius:8px 8px 0 0; }
    .badge { display:inline-block; padding:2px 7px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.04em; }
    .badge-rc     { background:#fef08a; color:#713f12; }
    .badge-auto   { background:#bfdbfe; color:#1e3a8a; }
    .badge-relic  { background:#d9f99d; color:#14532d; }
    .badge-num    { background:#fde68a; color:#78350f; }
    .badge-par    { background:#e9d5ff; color:#581c87; }
    .badge-foil   { background:#f0abfc; color:#701a75; }
    .badge-sp     { background:#fecaca; color:#7f1d1d; }
    .status-pill  { padding:2px 8px; border-radius:999px; font-size:10px; font-weight:600; text-transform:uppercase; }
    .s-pending    { background:#334155; color:#94a3b8; }
    .s-analyzing  { background:#1e3a8a; color:#93c5fd; }
    .s-pricing    { background:#164e63; color:#67e8f9; }
    .s-complete   { background:#14532d; color:#86efac; }
    .s-error      { background:#7f1d1d; color:#fca5a5; }
    .modal-bg     { position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px; }
    .modal-box    { background:#1e293b;border-radius:16px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulsing { animation: pulse 1.5s ease-in-out infinite; }
    .filter-btn { padding:6px 16px; border-radius:999px; font-size:13px; cursor:pointer; border:1px solid #334155; transition:all .15s; }
    .filter-btn.active { background:#3b82f6; border-color:#3b82f6; color:#fff; }
    .filter-btn:not(.active) { background:transparent; color:#94a3b8; }
    .filter-btn:not(.active):hover { border-color:#64748b; color:#cbd5e1; }
    .zoom-bg { position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:60;display:flex;align-items:center;justify-content:center;cursor:zoom-out; }
    .zoom-bg img { max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px; }
    .img-action-btn { padding:4px 12px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
    @keyframes priceFlash { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.7)} 40%{box-shadow:0 0 20px 8px rgba(34,197,94,.5)} 100%{box-shadow:0 0 0 0 transparent} }
    .price-updated { animation: priceFlash 1.5s ease-out 3; }
    .reprice-spinner { display:inline-block; width:16px; height:16px; border:2px solid #86efac; border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:6px; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="border-b border-slate-800 px-6 py-4 flex items-center justify-between sticky top-0 bg-slate-900/95 backdrop-blur z-10">
    <div class="flex items-center gap-3">
      <span class="text-2xl">⚾</span>
      <div>
        <h1 class="text-lg font-bold leading-tight">Sports Card Manager</h1>
        <p class="text-xs text-slate-400" id="header-stats">Loading…</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <a href="/api/export/csv" class="flex items-center gap-1 bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-xl font-medium text-sm transition-colors">
        📊 Export CSV
      </a>
      <a href="/scanner" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl font-semibold text-sm transition-colors">
        📷 Scan Card
      </a>
    </div>
  </header>

  <!-- Filters & Search -->
  <div class="px-6 py-4 flex flex-col sm:flex-row gap-3 border-b border-slate-800">
    <input
      id="search-input"
      type="text"
      placeholder="Search player, brand, set, team…"
      class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm outline-none focus:border-blue-500 transition-colors"
    >
    <div class="flex gap-2 flex-wrap">
      <button class="filter-btn active" data-status="">All</button>
      <button class="filter-btn" data-status="complete">Complete</button>
      <button class="filter-btn" data-status="analyzing">Analyzing</button>
      <button class="filter-btn" data-status="error">Error</button>
    </div>
  </div>

  <!-- Card Grid -->
  <main class="px-6 py-6">
    <div id="cards-grid" class="card-grid"></div>
    <div id="empty-state" class="hidden text-center py-24">
      <div class="text-5xl mb-4">📭</div>
      <h2 class="text-xl font-semibold text-slate-300">No cards yet</h2>
      <p class="text-slate-500 text-sm mt-2">Scan your first card to get started.</p>
      <a href="/scanner" class="inline-block mt-6 bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-semibold transition-colors">
        📷 Scan Your First Card
      </a>
    </div>
    <div id="loading-state" class="text-center py-24 text-slate-500">Loading cards…</div>
  </main>

  <!-- Detail Modal -->
  <div id="modal" class="modal-bg hidden" onclick="closeModal(event)">
    <div class="modal-box p-6" id="modal-content"></div>
  </div>

  <!-- Hidden file inputs for image replacement (photo mode) -->
  <input type="file" id="replace-front-input" accept="image/*" class="hidden">
  <input type="file" id="replace-back-input"  accept="image/*" class="hidden">

  <!-- Live Camera Scanner Overlay (for re-scanning existing cards) -->
  <div id="scan-overlay" class="fixed inset-0 z-60 bg-black hidden flex flex-col" style="z-index:70">
    <video id="scan-video" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover"></video>
    <!-- Card guide frame with darkened surroundings -->
    <div class="absolute inset-0 pointer-events-none">
      <svg class="w-full h-full" preserveAspectRatio="none">
        <defs>
          <mask id="scan-guide-mask">
            <rect width="100%" height="100%" fill="white"/>
            <rect x="15%" y="15%" width="70%" height="60%" rx="12" fill="black"/>
          </mask>
        </defs>
        <rect width="100%" height="100%" fill="rgba(0,0,0,0.6)" mask="url(#scan-guide-mask)"/>
      </svg>
      <div class="absolute border-2 border-white/70 rounded-xl" style="left:15%;top:15%;width:70%;height:60%;">
        <div class="absolute -top-0.5 -left-0.5 w-6 h-6 border-t-3 border-l-3 border-white rounded-tl-lg"></div>
        <div class="absolute -top-0.5 -right-0.5 w-6 h-6 border-t-3 border-r-3 border-white rounded-tr-lg"></div>
        <div class="absolute -bottom-0.5 -left-0.5 w-6 h-6 border-b-3 border-l-3 border-white rounded-bl-lg"></div>
        <div class="absolute -bottom-0.5 -right-0.5 w-6 h-6 border-b-3 border-r-3 border-white rounded-br-lg"></div>
      </div>
    </div>
    <!-- Label -->
    <div class="absolute top-6 left-0 right-0 text-center z-10">
      <span id="scan-label" class="bg-black/60 text-white text-sm font-semibold px-4 py-2 rounded-full">
        Position card inside the frame
      </span>
    </div>
    <!-- Controls -->
    <div class="absolute bottom-0 left-0 right-0 z-10 flex items-center justify-center gap-8 pb-10">
      <button onclick="closeScanCamera()" class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
        <span class="text-white text-2xl">&times;</span>
      </button>
      <button onclick="captureScan()" class="w-20 h-20 rounded-full bg-white flex items-center justify-center shadow-xl active:scale-95 transition-transform">
        <div class="w-16 h-16 rounded-full border-4 border-slate-900"></div>
      </button>
      <button onclick="flipScanCamera()" class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
        <span class="text-white text-lg">🔄</span>
      </button>
    </div>
  </div>

  <script>
    let allCards = [];
    let currentFilter = '';
    let currentSearch = '';
    let pollTimer = null;

    function formatEST(isoStr) {
      if (!isoStr) return '';
      return new Date(isoStr).toLocaleString('en-US', {
        timeZone: 'America/New_York', month: 'short', day: 'numeric',
        year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true
      }) + ' EST';
    }

    // ── Data loading ─────────────────────────────────────────────────────────

    async function loadCards() {
      const params = new URLSearchParams({ limit: 200 });
      if (currentSearch) params.set('search', currentSearch);
      if (currentFilter) params.set('status', currentFilter);
      const res = await fetch('/api/cards?' + params);
      const data = await res.json();
      allCards = data.cards;
      updateStats(data.stats);
      renderGrid(data.cards);
      // Poll if any cards are still processing
      const pending = data.cards.some(c => ['pending','analyzing','pricing'].includes(c.status));
      if (pending) {
        clearTimeout(pollTimer);
        pollTimer = setTimeout(loadCards, 3000);
      }
    }

    function updateStats(stats) {
      document.getElementById('header-stats').textContent =
        `${stats.total_cards} cards · ${stats.complete} analyzed · Est. value $${(stats.total_value||0).toFixed(2)}`;
    }

    // ── Rendering ────────────────────────────────────────────────────────────

    function badges(card) {
      const b = [];
      if (card.is_rookie_card)  b.push(`<span class="badge badge-rc">RC</span>`);
      if (card.is_autograph)    b.push(`<span class="badge badge-auto">AUTO</span>`);
      if (card.is_relic)        b.push(`<span class="badge badge-relic">${card.relic_type||'RELIC'}</span>`);
      if (card.is_numbered && card.print_run) b.push(`<span class="badge badge-num">/${card.print_run}</span>`);
      if (card.is_parallel && card.parallel_name) b.push(`<span class="badge badge-par">${card.parallel_name}</span>`);
      if (card.is_foil)         b.push(`<span class="badge badge-foil">FOIL</span>`);
      if (card.is_short_print)  b.push(`<span class="badge badge-sp">SP</span>`);
      return b.join(' ');
    }

    function statusPill(status) {
      const label = { pending:'Pending', analyzing:'Analyzing…', pricing:'Pricing…', complete:'Complete', error:'Error' }[status] || status;
      const cls = { pending:'s-pending', analyzing:'s-analyzing pulsing', pricing:'s-pricing pulsing', complete:'s-complete', error:'s-error' }[status] || 's-pending';
      return `<span class="status-pill ${cls}">${label}</span>`;
    }

    function renderGrid(cards) {
      const grid = document.getElementById('cards-grid');
      const empty = document.getElementById('empty-state');
      const loading = document.getElementById('loading-state');
      loading.classList.add('hidden');

      if (!cards.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      grid.innerHTML = cards.map(card => `
        <div class="bg-slate-800 rounded-xl overflow-hidden cursor-pointer hover:ring-2 hover:ring-blue-500 transition-all"
             onclick="openModal('${card.id}')">
          <div class="relative">
            <img src="${card.front_image_url}" class="card-thumb" alt="${card.player_name||'Card'}"
                 onerror="this.style.display='none'">
            <div class="absolute top-2 right-2">${statusPill(card.status)}</div>
          </div>
          <div class="p-3">
            <p class="font-semibold text-sm truncate">${card.player_name || '—'}</p>
            <p class="text-xs text-slate-400 truncate mt-0.5">
              ${[card.year, card.brand, card.set_name].filter(Boolean).join(' · ')}
            </p>
            <div class="flex flex-wrap gap-1 mt-2">${badges(card)}</div>
            <div class="mt-2 flex items-center justify-between">
              ${card.estimated_price
                ? `<span class="text-green-400 font-bold text-sm">$${card.estimated_price.toFixed(2)}</span>`
                : `<span class="text-slate-600 text-xs">No price yet</span>`
              }
              ${card.team ? `<span class="text-slate-500 text-xs truncate ml-2">${card.team}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    // ── Detail Modal ─────────────────────────────────────────────────────────

    let currentModalCardId = null;

    async function openModal(id) {
      currentModalCardId = id;
      const res = await fetch('/api/cards/' + id);
      const card = await res.json();
      const modal = document.getElementById('modal');
      const content = document.getElementById('modal-content');

      const row = (label, value) => value != null && value !== false && value !== ''
        ? `<div class="flex justify-between py-1.5 border-b border-slate-700 text-sm">
             <span class="text-slate-400">${label}</span>
             <span class="text-right font-medium max-w-xs">${value}</span>
           </div>`
        : '';

      // Editable text field
      const editField = (label, field, value, placeholder='') =>
        `<div class="flex items-center justify-between py-1.5 border-b border-slate-700 text-sm gap-3">
           <span class="text-slate-400 whitespace-nowrap">${label}</span>
           <input type="text" data-field="${field}" value="${value || ''}" placeholder="${placeholder}"
             class="edit-field bg-slate-700/50 border border-slate-600 rounded-lg px-2 py-1 text-sm text-right outline-none focus:border-blue-500 w-40 transition-colors">
         </div>`;

      // Editable toggle
      const editToggle = (label, field, checked, extraField='', extraValue='') => {
        let extra = '';
        if (extraField) {
          extra = `<input type="text" data-field="${extraField}" value="${extraValue || ''}" placeholder="Details..."
            class="edit-field bg-slate-700/50 border border-slate-600 rounded-lg px-2 py-1 text-xs outline-none focus:border-blue-500 w-24 ml-2 transition-colors">`;
        }
        return `<div class="flex items-center justify-between py-1.5 border-b border-slate-700 text-sm">
           <span class="text-slate-400">${label}</span>
           <div class="flex items-center">
             ${extra}
             <label class="relative inline-flex items-center cursor-pointer ml-2">
               <input type="checkbox" data-field="${field}" ${checked ? 'checked' : ''} class="sr-only peer edit-toggle">
               <div class="w-9 h-5 bg-slate-600 peer-focus:ring-2 peer-focus:ring-blue-500 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
             </label>
           </div>
         </div>`;
      };

      const hasFront = card.front_image_url && !card.front_image_url.includes('undefined');
      const hasBack = card.back_image_url && !card.back_image_url.includes('undefined');

      content.innerHTML = `
        <div class="flex items-start justify-between mb-5">
          <div>
            <h2 class="text-xl font-bold">${card.player_name || 'Unknown Card'}</h2>
            <p class="text-slate-400 text-sm">${[card.year,card.brand,card.set_name].filter(Boolean).join(' &middot; ')}</p>
            <div class="flex flex-wrap gap-1 mt-2">${badges(card)} ${statusPill(card.status)}</div>
          </div>
          <button onclick="closeModalDirect()" class="text-slate-400 hover:text-white text-2xl leading-none ml-4">&times;</button>
        </div>

        <!-- Images with Zoom / Replace buttons -->
        <div class="grid grid-cols-2 gap-3 mb-5">
          <div>
            <p class="text-xs text-slate-400 mb-1">FRONT</p>
            ${hasFront
              ? `<img src="${card.front_image_url}" class="w-full rounded-lg cursor-zoom-in" style="max-height:280px;object-fit:contain;background:#0f172a" alt="Front"
                   onclick="zoomImage('${card.front_image_url}')">`
              : `<div class="w-full rounded-lg flex items-center justify-center bg-slate-800" style="height:200px"><span class="text-slate-500 text-sm">No front image</span></div>`
            }
            <div class="grid gap-1 mt-2" style="grid-template-columns:${hasFront ? '1fr 1fr 1fr' : '1fr 1fr'}">
              ${hasFront ? `<button onclick="zoomImage('${card.front_image_url}')" class="img-action-btn bg-slate-700 hover:bg-slate-600 text-slate-200 text-center" style="padding:3px 4px;font-size:11px">🔍 Zoom</button>` : ''}
              <button onclick="document.getElementById('replace-front-input').click()" class="img-action-btn bg-blue-600/30 hover:bg-blue-600/50 text-blue-300 text-center" style="padding:3px 4px;font-size:11px">📷 Photo</button>
              <button onclick="openScanCamera('front')" class="img-action-btn bg-green-600/30 hover:bg-green-600/50 text-green-300 text-center" style="padding:3px 4px;font-size:11px">📐 Scan</button>
            </div>
          </div>
          <div>
            <p class="text-xs text-slate-400 mb-1">BACK</p>
            ${hasBack
              ? `<img src="${card.back_image_url}" class="w-full rounded-lg cursor-zoom-in" style="max-height:280px;object-fit:contain;background:#0f172a" alt="Back"
                   onclick="zoomImage('${card.back_image_url}')">`
              : `<div class="w-full rounded-lg flex items-center justify-center bg-slate-800" style="height:200px"><span class="text-slate-500 text-sm">No back image</span></div>`
            }
            <div class="grid gap-1 mt-2" style="grid-template-columns:${hasBack ? '1fr 1fr 1fr' : '1fr 1fr'}">
              ${hasBack ? `<button onclick="zoomImage('${card.back_image_url}')" class="img-action-btn bg-slate-700 hover:bg-slate-600 text-slate-200 text-center" style="padding:3px 4px;font-size:11px">🔍 Zoom</button>` : ''}
              <button onclick="document.getElementById('replace-back-input').click()" class="img-action-btn bg-blue-600/30 hover:bg-blue-600/50 text-blue-300 text-center" style="padding:3px 4px;font-size:11px">📷 Photo</button>
              <button onclick="openScanCamera('back')" class="img-action-btn bg-green-600/30 hover:bg-green-600/50 text-green-300 text-center" style="padding:3px 4px;font-size:11px">📐 Scan</button>
            </div>
          </div>
        </div>

        <!-- Editable Card Details -->
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-slate-300 text-xs uppercase tracking-widest">Card Details</h3>
          <span class="text-xs text-slate-500">Edit any field below</span>
        </div>
        <div class="mb-5" id="edit-details">
          ${editField('Player', 'player_name', card.player_name, 'Player name')}
          ${editField('Year', 'year', card.year, '2024')}
          ${editField('Brand', 'brand', card.brand, 'Topps, Panini...')}
          ${editField('Set', 'set_name', card.set_name, 'Prizm, Chrome...')}
          ${editField('Subset', 'subset', card.subset, 'All-Star, Draft...')}
          ${editField('Insert Set', 'insert_set', card.insert_set, 'Rated Rookie, Silver Pack...')}
          ${editField('Product Code', 'product_code', card.product_code, 'Code from back of card')}
          ${editField('Card #', 'card_number', card.card_number, '123')}
          ${editField('Team', 'team', card.team, 'Team name')}
          ${editField('Sport', 'sport', card.sport, 'Baseball')}
          ${editField('Condition', 'condition', card.condition, 'Mint, Near Mint...')}
          ${editToggle('Rookie Card', 'is_rookie_card', card.is_rookie_card)}
          ${editToggle('Parallel', 'is_parallel', card.is_parallel, 'parallel_name', card.parallel_name)}
          ${editToggle('Foil', 'is_foil', card.is_foil)}
          ${editToggle('Autograph', 'is_autograph', card.is_autograph)}
          ${editToggle('Relic / Memorabilia', 'is_relic', card.is_relic, 'relic_type', card.relic_type)}
          ${editToggle('Numbered', 'is_numbered', card.is_numbered, 'serial_number', card.serial_number)}
          ${editField('Print Run', 'print_run', card.print_run, '25, 50, 99...')}
          ${editToggle('Alternate Jersey', 'has_alternate_jersey', card.has_alternate_jersey, 'jersey_description', card.jersey_description)}
          ${editToggle('Short Print', 'is_short_print', card.is_short_print)}
          ${editField('Notable Features', 'notable_features', card.notable_features, 'Error card, SSP...')}
          <div class="py-1.5 border-b border-slate-700 text-sm">
            <span class="text-slate-400">Description</span>
            <textarea data-field="description"
              class="edit-field w-full mt-1 bg-slate-700/50 border border-slate-600 rounded-lg px-2 py-1 text-sm outline-none focus:border-blue-500 resize-none transition-colors"
              rows="2" placeholder="Brief card description...">${card.description || ''}</textarea>
          </div>
        </div>

        <!-- Pricing -->
        <h3 class="font-semibold text-slate-300 text-xs uppercase tracking-widest mb-2">eBay Pricing (Sold Listings)</h3>
        <div class="mb-5">
          ${card.ebay_avg_sale
            ? `${row('Avg Sale', '$' + card.ebay_avg_sale.toFixed(2))}
               ${row('Low', '$' + card.ebay_low.toFixed(2))}
               ${row('High', '$' + card.ebay_high.toFixed(2))}
               ${row('# Sales Found', card.ebay_num_sales)}
               ${row('Search Used', card.ebay_search_query)}
               ${card.ebay_last_checked ? row('Last Checked', formatEST(card.ebay_last_checked)) : ''}`
            : `<p class="text-slate-500 text-sm py-2">No pricing data yet.</p>`
          }
        </div>

        ${card.estimated_price
          ? `<div id="price-box" class="bg-green-900/40 border border-green-700 rounded-xl p-4 mb-5 text-center">
               <p class="text-xs text-green-400 uppercase tracking-widest">Estimated Sell Price</p>
               <p class="text-3xl font-bold text-green-300 mt-1">$${card.estimated_price.toFixed(2)}</p>
             </div>`
          : `<div id="price-box" class="bg-slate-800 border border-slate-700 rounded-xl p-4 mb-5 text-center">
               <p class="text-xs text-slate-500">No price yet</p>
             </div>`
        }

        <!-- Notes -->
        <h3 class="font-semibold text-slate-300 text-xs uppercase tracking-widest mb-2">Notes</h3>
        <textarea id="notes-input"
          class="w-full bg-slate-700 border border-slate-600 rounded-xl p-3 text-sm resize-none outline-none focus:border-blue-500 transition-colors mb-4"
          rows="3" placeholder="Add notes about this card..."
        >${card.notes || ''}</textarea>

        <!-- Actions -->
        <div class="flex flex-wrap gap-3">
          <button onclick="saveAllDetails('${card.id}')"
            class="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 font-semibold text-sm transition-colors">
            Save Details
          </button>
          <button onclick="saveAndReprice('${card.id}')"
            class="flex-1 py-2.5 rounded-xl bg-green-700 hover:bg-green-600 font-semibold text-sm transition-colors">
            Save &amp; Reprice
          </button>
          <button onclick="deleteCard('${card.id}')"
            class="py-2.5 px-4 rounded-xl bg-red-900/50 hover:bg-red-800/60 font-medium text-sm text-red-400 transition-colors">
            Delete
          </button>
        </div>

        <p class="text-slate-600 text-xs mt-4 text-center">ID: ${card.id}</p>
      `;

      modal.classList.remove('hidden');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modal')) closeModalDirect();
    }
    function closeModalDirect() {
      document.getElementById('modal').classList.add('hidden');
    }

    function zoomImage(url) {
      const overlay = document.createElement('div');
      overlay.className = 'zoom-bg';
      overlay.onclick = () => overlay.remove();
      overlay.innerHTML = `<img src="${url}" alt="Zoomed card">`;
      document.body.appendChild(overlay);
      // Also close on Escape
      const esc = (e) => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); } };
      document.addEventListener('keydown', esc);
    }

    function gatherEditFields() {
      const body = {};
      // Text/number inputs
      document.querySelectorAll('#edit-details .edit-field').forEach(el => {
        const field = el.dataset.field;
        let val = el.value.trim();
        if (field === 'year' || field === 'print_run') {
          val = val ? parseInt(val, 10) || null : null;
        }
        body[field] = val || null;
      });
      // Toggle checkboxes
      document.querySelectorAll('#edit-details .edit-toggle').forEach(el => {
        body[el.dataset.field] = el.checked;
      });
      // Notes
      const notesEl = document.getElementById('notes-input');
      if (notesEl) body.notes = notesEl.value;
      return body;
    }

    async function saveAllDetails(id) {
      const body = gatherEditFields();
      await fetch('/api/cards/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      showToast('Details saved');
      loadCards();
    }

    async function saveAndReprice(id) {
      const body = gatherEditFields();
      await fetch('/api/cards/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      await fetch('/api/cards/' + id + '/reprice', { method: 'POST' });

      // Show repricing indicator in the price box
      const priceBox = document.querySelector('#price-box');
      if (priceBox) {
        priceBox.innerHTML = `<p class="text-xs text-green-400 uppercase tracking-widest"><span class="reprice-spinner"></span> Repricing...</p>
          <p class="text-lg text-green-300/50 mt-1">Checking eBay & AI...</p>`;
      }
      showToast('Saved! Fetching new price...');

      // Poll until pricing updates, then flash
      const pollReprice = setInterval(async () => {
        const res = await fetch('/api/cards/' + id);
        const card = await res.json();
        if (card.ebay_last_checked) {
          clearInterval(pollReprice);
          loadCards();
          await openModal(id);
          // Flash the price box
          const newPriceBox = document.querySelector('#price-box');
          if (newPriceBox) {
            newPriceBox.classList.add('price-updated');
            showToast('Price updated: $' + (card.estimated_price ? card.estimated_price.toFixed(2) : '—'));
          }
        }
      }, 2000);
      // Stop polling after 30s max
      setTimeout(() => clearInterval(pollReprice), 30000);
    }

    async function replaceImage(side, file, scanMode = false) {
      if (!currentModalCardId || !file) return;
      const form = new FormData();
      form.append('image', file, side + '.jpg');
      const scanParam = scanMode ? '?scan_mode=true' : '';
      showToast('Uploading ' + side + ' image' + (scanMode ? ' (scanning)' : '') + '...');
      const res = await fetch(`/api/cards/${currentModalCardId}/image/${side}${scanParam}`, {
        method: 'POST', body: form
      });
      if (res.ok) {
        showToast(side.charAt(0).toUpperCase() + side.slice(1) + ' image replaced');
        openModal(currentModalCardId); // Refresh modal
        loadCards();
      } else {
        showToast('Failed to replace image');
      }
    }

    // Wire up the hidden file inputs for image replacement (photo mode)
    document.getElementById('replace-front-input').addEventListener('change', e => {
      if (e.target.files[0]) replaceImage('front', e.target.files[0], false);
      e.target.value = '';
    });
    document.getElementById('replace-back-input').addEventListener('change', e => {
      if (e.target.files[0]) replaceImage('back', e.target.files[0], false);
      e.target.value = '';
    });

    // ── Live Camera Scanner (for re-scanning existing cards) ────────────────

    let scanStream = null;
    let scanSide = null; // 'front' or 'back'
    let scanFacing = 'environment';

    async function openScanCamera(side) {
      scanSide = side;
      const video = document.getElementById('scan-video');
      const overlay = document.getElementById('scan-overlay');
      const label = document.getElementById('scan-label');
      label.textContent = 'Position card ' + side + ' inside the frame';

      try {
        if (scanStream) scanStream.getTracks().forEach(t => t.stop());
        scanStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: scanFacing, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = scanStream;
        overlay.classList.remove('hidden');
      } catch (err) {
        // Camera not available — fall back to file picker with scan_mode
        showToast('Camera not available, use Photo instead');
      }
    }

    async function flipScanCamera() {
      scanFacing = scanFacing === 'environment' ? 'user' : 'environment';
      if (scanStream) {
        scanStream.getTracks().forEach(t => t.stop());
        const video = document.getElementById('scan-video');
        scanStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: scanFacing, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = scanStream;
      }
    }

    function captureScan() {
      const video = document.getElementById('scan-video');
      const fullCanvas = document.createElement('canvas');
      fullCanvas.width = video.videoWidth;
      fullCanvas.height = video.videoHeight;
      const ctx = fullCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      // Crop to the guide area (matches CSS: 15% inset, 70% wide, 60% tall)
      const cropX = Math.round(video.videoWidth * 0.15);
      const cropY = Math.round(video.videoHeight * 0.15);
      const cropW = Math.round(video.videoWidth * 0.70);
      const cropH = Math.round(video.videoHeight * 0.60);

      const cropCanvas = document.createElement('canvas');
      cropCanvas.width = cropW;
      cropCanvas.height = cropH;
      const cropCtx = cropCanvas.getContext('2d');
      cropCtx.drawImage(fullCanvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

      cropCanvas.toBlob(blob => {
        const file = new File([blob], scanSide + '.jpg', { type: 'image/jpeg' });
        closeScanCamera();
        replaceImage(scanSide, file, true);
      }, 'image/jpeg', 0.92);
    }

    function closeScanCamera() {
      if (scanStream) {
        scanStream.getTracks().forEach(t => t.stop());
        scanStream = null;
      }
      document.getElementById('scan-overlay').classList.add('hidden');
    }

    async function deleteCard(id) {
      if (!confirm('Delete this card and its images? This cannot be undone.')) return;
      await fetch('/api/cards/' + id, { method: 'DELETE' });
      closeModalDirect();
      loadCards();
    }

    // ── Toast ────────────────────────────────────────────────────────────────

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-700 text-white text-sm px-5 py-2.5 rounded-xl shadow-xl z-50 transition-opacity';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    // ── Filters & Search ─────────────────────────────────────────────────────

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        loadCards();
      });
    });

    let searchDebounce;
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        currentSearch = e.target.value.trim();
        loadCards();
      }, 300);
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    loadCards();
  </script>
</body>
</html>
