<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Sports Card Manager</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body { background:#0f172a; color:#f1f5f9; min-height:100vh; margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .page-header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid #1e293b; background:rgba(15,23,42,.95); }
    .site-title { display:flex; align-items:center; gap:10px; text-decoration:none; color:#f1f5f9; }
    .site-title:hover { color:#60a5fa; }
    .site-title h1 { font-size:16px; font-weight:700; margin:0; }
    .back-btn { display:inline-flex; align-items:center; gap:6px; background:#1e293b; border:1px solid #334155; color:#cbd5e1; padding:8px 14px; border-radius:10px; font-size:13px; font-weight:500; text-decoration:none; }
    .back-btn:hover { background:#334155; color:#fff; }
    .wrap { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 70px); padding:24px; }
    .box { background:#1e293b; border-radius:16px; padding:40px; width:100%; max-width:400px; }
    .input { width:100%; background:#0f172a; border:1px solid #334155; border-radius:12px; padding:12px 16px; color:#f1f5f9; font-size:15px; outline:none; box-sizing:border-box; }
    .input:focus { border-color:#3b82f6; }
    .btn { width:100%; padding:12px; border-radius:12px; background:#3b82f6; color:white; font-weight:600; font-size:15px; cursor:pointer; border:none; }
    .btn:hover { background:#2563eb; }
    .btn:disabled { background:#334155; cursor:not-allowed; }
    .msg { text-align:center; font-size:13px; min-height:20px; margin-top:12px; }
    .msg.err { color:#f87171; }
    .msg.ok { color:#86efac; }
    label { display:block; font-size:12px; color:#94a3b8; margin-bottom:6px; font-weight:600; }
    .field { margin-bottom:16px; }
    h1.title { font-size:22px; font-weight:800; text-align:center; margin:0 0 6px; }
    .sub { text-align:center; color:#94a3b8; font-size:13px; margin:0 0 24px; }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="/" class="site-title"><span style="font-size:22px">⚾</span><h1>Sports Card Manager</h1></a>
    <a href="/" class="back-btn">← Back to Dashboard</a>
  </header>

  <div class="wrap">
    <div class="box">
      <div style="text-align:center; margin-bottom:20px;"><span style="font-size:40px;">🔐</span></div>
      <h1 class="title">Choose a new password</h1>
      <p class="sub">Enter a new password for your account.</p>
      <form id="reset-form">
        <div class="field">
          <label>New Password</label>
          <input type="password" id="password" class="input" placeholder="At least 6 characters" autocomplete="new-password" required>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm" class="input" placeholder="Re-enter password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn" id="submit-btn">Reset Password</button>
        <p class="msg" id="msg"></p>
      </form>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token') || '';
    const msg = document.getElementById('msg');
    const form = document.getElementById('reset-form');
    if (!token) {
      msg.textContent = 'Missing reset token. Please use the link from your email.';
      msg.className = 'msg err';
      document.getElementById('submit-btn').disabled = true;
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const pw = document.getElementById('password').value;
      const cf = document.getElementById('confirm').value;
      msg.textContent = ''; msg.className = 'msg';
      if (pw.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; msg.className = 'msg err'; return; }
      if (pw !== cf) { msg.textContent = 'Passwords do not match.'; msg.className = 'msg err'; return; }
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          msg.textContent = '✅ Password updated! Redirecting to login…';
          msg.className = 'msg ok';
          setTimeout(() => { window.location.href = '/login'; }, 1800);
        } else {
          msg.textContent = data.detail || 'Could not reset password.';
          msg.className = 'msg err';
          btn.disabled = false; btn.textContent = 'Reset Password';
        }
      } catch {
        msg.textContent = 'Connection error. Try again.';
        msg.className = 'msg err';
        btn.disabled = false; btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
