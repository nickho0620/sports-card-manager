<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Card Radar</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; min-height: 100vh; margin: 0; }
    .page-header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid #1e293b; background:rgba(15,23,42,.95); backdrop-filter: blur(8px); }
    .site-title { display:flex; align-items:center; gap:10px; text-decoration:none; color:#f1f5f9; }
    .site-title:hover { color:#60a5fa; }
    .site-title h1 { font-size:16px; font-weight:700; margin:0; }
    .back-btn { display:inline-flex; align-items:center; gap:6px; background:#1e293b; border:1px solid #334155; color:#cbd5e1; padding:8px 14px; border-radius:10px; font-size:13px; font-weight:500; text-decoration:none; transition:all .15s; }
    .back-btn:hover { background:#334155; color:#fff; border-color:#475569; }
    .login-wrap { display:flex; align-items:center; justify-content:center; min-height: calc(100vh - 70px); padding:24px; }
    .login-box { background:#1e293b; border-radius:16px; padding:40px; width:100%; max-width:380px; }
    .login-input { width:100%; background:#0f172a; border:1px solid #334155; border-radius:12px; padding:12px 16px; color:#f1f5f9; font-size:15px; outline:none; transition:border-color .2s; box-sizing:border-box; }
    .login-input:focus { border-color:#3b82f6; }
    .login-btn { width:100%; padding:12px; border-radius:12px; background:#3b82f6; color:white; font-weight:600; font-size:15px; cursor:pointer; border:none; transition:background .15s; }
    .login-btn:hover { background:#2563eb; }
    .login-btn:disabled { background:#334155; cursor:not-allowed; }
    .error-msg { color:#f87171; font-size:13px; text-align:center; margin-top:12px; min-height:20px; }
    .link { color:#60a5fa; text-decoration:none; font-size:13px; }
    .link:hover { text-decoration:underline; }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="/" class="site-title">
      <img src="/static/logo.png" alt="Card Radar" style="height:42px; width:auto;">
    </a>
    <a href="/" class="back-btn">← Back to Dashboard</a>
  </header>

  <div class="login-wrap">
    <div class="login-box">
      <div class="text-center mb-6">
        <img src="/static/logo.png" alt="Card Radar" style="width:240px; max-width:100%; height:auto; display:block; margin:0 auto;">
        <h1 class="text-xl font-bold mt-3">Create your account</h1>
        <p class="text-sm text-slate-400 mt-1">Free accounts can scan up to 5 cards</p>
      </div>
      <form id="register-form">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
          <div>
            <label class="block text-xs text-slate-400 mb-1.5 font-medium">First Name</label>
            <input type="text" id="first_name" class="login-input" placeholder="First" autocomplete="given-name" required>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1.5 font-medium">Last Name</label>
            <input type="text" id="last_name" class="login-input" placeholder="Last" autocomplete="family-name" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-xs text-slate-400 mb-1.5 font-medium">Username</label>
          <input type="text" id="username" class="login-input" placeholder="3-32 characters" autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label class="block text-xs text-slate-400 mb-1.5 font-medium">Email</label>
          <input type="email" id="email" class="login-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="mb-4">
          <label class="block text-xs text-slate-400 mb-1.5 font-medium">Phone <span class="text-slate-500">(optional)</span></label>
          <input type="tel" id="phone" class="login-input" placeholder="(555) 555-5555" autocomplete="tel">
        </div>
        <div class="mb-6">
          <label class="block text-xs text-slate-400 mb-1.5 font-medium">Password</label>
          <input type="password" id="password" class="login-input" placeholder="At least 6 characters" autocomplete="new-password" required>
        </div>
        <button type="submit" class="login-btn" id="register-btn">Create Account</button>
        <p class="error-msg" id="error-msg"></p>
        <div id="verify-notice" style="display:none; background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.4); border-radius:10px; padding:14px; margin-top:14px; color:#86efac; font-size:13px; line-height:1.5;"></div>
        <p class="text-center mt-4">
          <a href="/login" class="link">Already have an account? Sign in</a>
        </p>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      err.textContent = '';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          const data = await res.json();
          // Hide the form and show a "check your email" panel.
          document.getElementById('register-form').style.display = 'none';
          const notice = document.getElementById('verify-notice');
          notice.innerHTML = `
            <div style="font-size:48px; margin-bottom:12px;">📬</div>
            <h2 style="font-size:20px; font-weight:800; color:#f1f5f9; margin:0 0 10px;">Check your email</h2>
            <p style="color:#cbd5e1; font-size:14px; line-height:1.55; margin:0 0 16px;">
              We sent a verification link to <strong>${data.email || 'your email'}</strong>.
              Click it to activate your account — you won't be able to sign in until your email is verified.
            </p>
            <p style="color:#94a3b8; font-size:12px; margin:0 0 16px;">Didn't see it? Check your spam folder, or make sure you entered the right address.</p>
            <a href="/login" style="display:inline-block; background:#3b82f6; color:#fff; padding:10px 24px; border-radius:10px; font-weight:700; font-size:14px; text-decoration:none;">Go to Sign In →</a>
          `;
          notice.style.background = 'transparent';
          notice.style.border = 'none';
          notice.style.padding = '0';
          notice.style.textAlign = 'center';
          notice.style.display = 'block';
        } else {
          const data = await res.json();
          err.textContent = data.detail || 'Registration failed';
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      } catch (ex) {
        err.textContent = 'Connection error. Try again.';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
