<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — CardMint</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; min-height: 100vh; margin: 0; }
    .page-header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid #1e293b; background:rgba(15,23,42,.95); backdrop-filter: blur(8px); }
    .site-title { display:flex; align-items:center; gap:10px; text-decoration:none; color:#f1f5f9; }
    .site-title:hover { color:#60a5fa; }
    .site-title h1 { font-size:16px; font-weight:700; margin:0; }
    .back-btn { display:inline-flex; align-items:center; gap:6px; background:#1e293b; border:1px solid #334155; color:#cbd5e1; padding:8px 14px; border-radius:10px; font-size:13px; font-weight:500; text-decoration:none; transition:all .15s; }
    .back-btn:hover { background:#334155; color:#fff; border-color:#475569; }
    .login-wrap { display:flex; align-items:center; justify-content:center; min-height: calc(100vh - 70px); padding:24px; }
    .login-box { background:#1e293b; border-radius:16px; padding:40px; width:100%; max-width:380px; }
    .login-input { width:100%; background:#0f172a; border:1px solid #334155; border-radius:12px; padding:12px 16px; color:#f1f5f9; font-size:15px; outline:none; transition:border-color .2s; box-sizing:border-box; }
    .login-input:focus { border-color:#3b82f6; }
    .login-btn { width:100%; padding:12px; border-radius:12px; background:#3b82f6; color:white; font-weight:600; font-size:15px; cursor:pointer; border:none; transition:background .15s; }
    .login-btn:hover { background:#2563eb; }
    .login-btn:disabled { background:#334155; cursor:not-allowed; }
    .error-msg { color:#f87171; font-size:13px; text-align:center; margin-top:12px; min-height:20px; }
    .link { color:#60a5fa; text-decoration:none; font-size:13px; }
    .link:hover { text-decoration:underline; }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="/" class="site-title" style="display:inline-flex;align-items:center;">
      <img src="/static/cardminttextlogo.png" alt="CardMint" style="height:38px;">
    </a>
    <a href="/collection" class="back-btn">← Back to Dashboard</a>
  </header>

  <div class="login-wrap">
    <div class="login-box">
      <div id="register-hero" class="text-center mb-6">
        <div style="text-align:center;margin-bottom:4px;display:flex;justify-content:center;"><img src="/static/cardminttextlogo.png" alt="CardMint" style="height:56px;"></div>
        <h1 class="text-xl font-bold mt-3">Create your account</h1>
        <p class="text-sm text-slate-400 mt-1">Free accounts can scan up to 5 cards</p>
      </div>
      <form id="register-form">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
          <div>
            <label class="block text-xs text-slate-400 mb-1.5 font-medium">First Name</label>
            <input type="text" id="first_name" class="login-input" placeholder="First" autocomplete="given-name" required>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1.5 font-medium">Last Name</label>
            <input type="text" id="last_name" class="login-input" placeholder="Last" autocomplete="family-name" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-xs text-slate-400 mb-1.5 font-medium">Username</label>
          <input type="text" id="username" class="login-input" placeholder="3-32 characters" autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label class="block text-xs text-slate-400 mb-1.5 font-medium">Email</label>
          <input type="email" id="email" class="login-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="mb-4">
          <label class="block text-xs text-slate-400 mb-1.5 font-medium">Phone <span class="text-slate-500">(optional)</span></label>
          <input type="tel" id="phone" class="login-input" placeholder="(555) 555-5555" autocomplete="tel">
        </div>
        <div class="mb-6">
          <label class="block text-xs text-slate-400 mb-1.5 font-medium">Password</label>
          <input type="password" id="password" class="login-input" placeholder="At least 6 characters" autocomplete="new-password" required>
        </div>
        <button type="submit" class="login-btn" id="register-btn">Create Account</button>
        <p class="error-msg" id="error-msg"></p>
        <p class="text-center mt-4">
          <a href="/login" class="link">Already have an account? Sign in</a>
        </p>
      </form>
      <!-- Verification panel (hidden until registration succeeds) -->
      <div id="verify-notice" style="display:none;"></div>
    </div>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      err.textContent = '';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          const data = await res.json();
          const sentTo = data.email || document.getElementById('email').value;
          // Swap the whole card over to the success state.
          document.getElementById('register-hero').style.display = 'none';
          document.getElementById('register-form').style.display = 'none';
          const notice = document.getElementById('verify-notice');
          notice.innerHTML = `
            <div style="text-align:center;">
              <div style="text-align:center;margin-bottom:18px;"><img src="/static/cardminttextlogo.png" alt="CardMint" style="height:40px;"></div>
              <div style="display:inline-flex; align-items:center; justify-content:center; width:72px; height:72px; border-radius:50%; background:rgba(34,197,94,.12); border:2px solid rgba(34,197,94,.35); margin:0 auto 18px;">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <h1 style="font-size:24px; font-weight:800; color:#f1f5f9; margin:0 0 10px;">Check your email to verify</h1>
              <p style="color:#cbd5e1; font-size:15px; line-height:1.6; margin:0 0 18px;">
                Your CardMint account has been created. To finish setting it up, we sent a verification link to:
              </p>
              <p style="color:#f1f5f9; font-size:16px; font-weight:700; word-break:break-all; background:rgba(59,130,246,.08); border:1px solid rgba(59,130,246,.35); padding:12px 16px; border-radius:10px; margin:0 0 20px;">
                ${sentTo}
              </p>
              <p style="color:#cbd5e1; font-size:14px; line-height:1.6; margin:0 0 10px;">
                Click the link in that email to activate your account. You won't be able to sign in until your email is verified.
              </p>
              <p style="color:#94a3b8; font-size:12px; margin:0 0 24px;">
                Didn't receive it within a minute? Check your spam or junk folder, or request a new link below.
              </p>
              <div style="display:flex; flex-direction:column; gap:10px;">
                <a href="/login" style="display:inline-block; background:#3b82f6; color:#fff; padding:12px 20px; border-radius:10px; font-weight:700; font-size:14px; text-decoration:none;">Go to Sign In →</a>
                <a href="/collection" style="display:inline-block; background:transparent; color:#cbd5e1; border:1px solid #334155; padding:11px 20px; border-radius:10px; font-weight:600; font-size:14px; text-decoration:none;">Browse as guest</a>
                <button type="button" id="resend-verify-btn" style="background:transparent; color:#94a3b8; border:none; padding:6px 20px; font-weight:500; font-size:13px; cursor:pointer; text-decoration:underline; text-align:center;">Resend verification email</button>
                <p id="resend-verify-msg" style="margin:4px 0 0; color:#94a3b8; font-size:12px; min-height:16px; text-align:center;"></p>
              </div>
            </div>
          `;
          notice.style.display = 'block';

          // Wire up resend button
          document.getElementById('resend-verify-btn').addEventListener('click', async () => {
            const rb = document.getElementById('resend-verify-btn');
            const rm = document.getElementById('resend-verify-msg');
            rb.disabled = true; rb.textContent = 'Sending…'; rm.textContent = '';
            try {
              await fetch('/api/auth/resend-verification-public', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: sentTo }),
              });
              rm.style.color = '#86efac';
              rm.textContent = '✅ Sent! Give it another minute and check your inbox + spam.';
            } catch {
              rm.style.color = '#f87171';
              rm.textContent = 'Could not resend. Try again in a moment.';
            }
            rb.disabled = false; rb.textContent = 'Resend verification email';
          });
        } else {
          const data = await res.json();
          err.textContent = data.detail || 'Registration failed';
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      } catch (ex) {
        err.textContent = 'Connection error. Try again.';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
