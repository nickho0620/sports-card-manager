<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Sports Card Manager</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #1e293b; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
    .login-input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 12px 16px; color: #f1f5f9; font-size: 15px; outline: none; transition: border-color .2s; }
    .login-input:focus { border-color: #3b82f6; }
    .login-btn { width: 100%; padding: 12px; border-radius: 12px; background: #3b82f6; color: white; font-weight: 600; font-size: 15px; cursor: pointer; border: none; transition: background .15s; }
    .login-btn:hover { background: #2563eb; }
    .login-btn:disabled { background: #334155; cursor: not-allowed; }
    .error-msg { color: #f87171; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
    .link { color: #60a5fa; text-decoration: none; font-size: 13px; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="text-center mb-6">
      <span class="text-4xl">⚾</span>
      <h1 class="text-xl font-bold mt-3">Create your account</h1>
      <p class="text-sm text-slate-400 mt-1">Free accounts can scan up to 5 cards</p>
    </div>
    <form id="register-form">
      <div class="mb-4">
        <label class="block text-xs text-slate-400 mb-1.5 font-medium">Username</label>
        <input type="text" id="username" class="login-input" placeholder="3-32 characters" autocomplete="username" required>
      </div>
      <div class="mb-4">
        <label class="block text-xs text-slate-400 mb-1.5 font-medium">Email <span class="text-slate-500">(optional)</span></label>
        <input type="email" id="email" class="login-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="mb-6">
        <label class="block text-xs text-slate-400 mb-1.5 font-medium">Password</label>
        <input type="password" id="password" class="login-input" placeholder="At least 6 characters" autocomplete="new-password" required>
      </div>
      <button type="submit" class="login-btn" id="register-btn">Create Account</button>
      <p class="error-msg" id="error-msg"></p>
      <p class="text-center mt-4">
        <a href="/login" class="link">Already have an account? Sign in</a>
      </p>
    </form>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      err.textContent = '';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          err.textContent = data.detail || 'Registration failed';
        }
      } catch (ex) {
        err.textContent = 'Connection error. Try again.';
      }
      btn.disabled = false;
      btn.textContent = 'Create Account';
    });
  </script>
</body>
</html>
