<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Card Scanner</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .preview-img { width: 100%; max-height: 38vh; object-fit: contain; background: #0f172a; border-radius: 12px; }
    .step-dot { width:10px; height:10px; border-radius:50%; background:#334155; transition: background .3s; }
    .step-dot.active { background:#3b82f6; }
    .step-dot.done { background:#22c55e; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
    .source-btn { display:flex; flex-direction:column; align-items:center; gap:6px; padding:16px 12px;
      background:#1e293b; border:2px solid #334155; border-radius:16px; cursor:pointer; transition:all .15s; flex:1; }
    .source-btn:hover { border-color:#3b82f6; background:#1e293b; }
    .source-btn:active { background:#0f172a; }
    .ptoggle { position:relative; }
    .ptoggle.pton { background:#3b82f6 !important; }
    .ptoggle.pton > div { transform:translateX(20px) !important; }
  </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

  <!-- Header -->
  <div class="flex items-center justify-between px-5 pt-6 pb-3">
    <a href="/collection" class="text-slate-400 text-sm">&larr; Dashboard</a>
    <h1 class="text-lg font-bold tracking-tight">Card Scanner</h1>
    <div class="w-16"></div>
  </div>

  <!-- Step indicators -->
  <div class="flex justify-center gap-3 pb-4" id="step-dots">
    <div class="step-dot active" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
    <div class="step-dot" id="dot-3"></div>
  </div>

  <!-- Main content area -->
  <div class="flex-1 px-5 pb-8" id="main-content"></div>

  <!-- Hidden file inputs: file-picker fallback -->
  <input type="file" id="front-camera"  accept="image/*" capture="environment" class="hidden">
  <input type="file" id="front-file"    accept="image/*" class="hidden">
  <input type="file" id="back-camera"   accept="image/*" capture="environment" class="hidden">
  <input type="file" id="back-file"     accept="image/*" class="hidden">

  <!-- Live Camera Scanner Overlay -->
  <div id="camera-overlay" class="fixed inset-0 z-50 bg-black hidden flex flex-col">
    <video id="camera-video" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover"></video>

    <!-- Card guide frame with darkened surroundings -->
    <div class="absolute inset-0 pointer-events-none" id="guide-overlay">
      <svg class="w-full h-full" preserveAspectRatio="none">
        <defs>
          <mask id="guide-mask">
            <rect width="100%" height="100%" fill="white"/>
            <rect id="guide-rect" x="15%" y="15%" width="70%" height="60%" rx="12" fill="black"/>
          </mask>
        </defs>
        <rect width="100%" height="100%" fill="rgba(0,0,0,0.6)" mask="url(#guide-mask)"/>
      </svg>
      <!-- Guide border -->
      <div class="absolute border-2 border-white/70 rounded-xl"
           style="left:15%;top:15%;width:70%;height:60%;">
        <!-- Corner markers -->
        <div class="absolute -top-0.5 -left-0.5 w-6 h-6 border-t-3 border-l-3 border-white rounded-tl-lg"></div>
        <div class="absolute -top-0.5 -right-0.5 w-6 h-6 border-t-3 border-r-3 border-white rounded-tr-lg"></div>
        <div class="absolute -bottom-0.5 -left-0.5 w-6 h-6 border-b-3 border-l-3 border-white rounded-bl-lg"></div>
        <div class="absolute -bottom-0.5 -right-0.5 w-6 h-6 border-b-3 border-r-3 border-white rounded-br-lg"></div>
      </div>
    </div>

    <!-- Label -->
    <div class="absolute top-6 left-0 right-0 text-center z-10">
      <span id="camera-label" class="bg-black/60 text-white text-sm font-semibold px-4 py-2 rounded-full">
        Position card front inside the frame
      </span>
    </div>

    <!-- Controls -->
    <div class="absolute bottom-0 left-0 right-0 z-10 flex items-center justify-center gap-8 pb-10">
      <button onclick="closeCamera()" class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
        <span class="text-white text-2xl">&times;</span>
      </button>
      <button onclick="captureFromCamera()" id="capture-btn"
        class="w-20 h-20 rounded-full bg-white flex items-center justify-center shadow-xl active:scale-95 transition-transform">
        <div class="w-16 h-16 rounded-full border-4 border-slate-900"></div>
      </button>
      <button onclick="flipCamera()" id="flip-btn" class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
        <span class="text-white text-lg">🔄</span>
      </button>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    let state = 'initial';  // initial | front-captured | back-captured | uploading | complete | error
    let frontFile = null;
    let backFile  = null;
    let resultCardId = null;
    let useScanMode = false;  // true when images come from live camera scanner

    // ── Common sets list (pre-seeded for the dropdown) ──────────────────────
    const COMMON_SETS = [
      "Unknown",
      "── Baseball ──",
      "Bowman",
      "Bowman Chrome",
      "Bowman 1st",
      "Bowman Draft",
      "Bowman Heritage",
      "Bowman Sterling",
      "Donruss",
      "Donruss Optic",
      "Fleer",
      "Leaf",
      "Panini Prizm",
      "Score",
      "Select",
      "Stadium Club",
      "Topps",
      "Topps Chrome",
      "Topps Heritage",
      "Topps Allen & Ginter",
      "Topps Archives",
      "Topps Finest",
      "Topps Fire",
      "Topps Gallery",
      "Topps Gypsy Queen",
      "Topps Inception",
      "Topps Museum Collection",
      "Topps Series 1",
      "Topps Series 2",
      "Topps Update",
      "Topps Tier One",
      "Topps Triple Threads",
      "Topps Tribute",
      "Upper Deck",
      "── Basketball ──",
      "Court Kings",
      "Donruss",
      "Donruss Optic",
      "Hoops",
      "Mosaic",
      "National Treasures",
      "Panini Prizm",
      "Select",
      "Spectra",
      "── Football ──",
      "Donruss",
      "Donruss Optic",
      "Mosaic",
      "National Treasures",
      "Panini Prizm",
      "Playbook",
      "Score",
      "Select",
      "── Hockey ──",
      "O-Pee-Chee",
      "Upper Deck",
      "Upper Deck Series 1",
      "Upper Deck Series 2",
      "Upper Deck Young Guns",
      "── Other ──",
      "Other (type below)",
    ];

    function setDropdownHtml() {
      const savedSet = sessionStorage.getItem('cardmint_set_hint') || 'Unknown';
      const savedCustom = sessionStorage.getItem('cardmint_set_custom') || '';
      const isOther = savedSet === 'Other (type below)';
      const opts = COMMON_SETS.map(s => {
        if (s.startsWith('──')) return `<option disabled style="font-weight:bold;color:#60a5fa;">${s}</option>`;
        const sel = s === savedSet ? ' selected' : '';
        return `<option value="${s}"${sel}>${s}</option>`;
      }).join('');
      return `
        <div style="width:100%; margin-top:4px;">
          <label style="display:block;font-size:11px;color:#94a3b8;margin-bottom:4px;font-weight:600;">Card Set (helps AI accuracy)</label>
          <select id="set-hint" onchange="onSetHintChange(this.value)"
            style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#f1f5f9;font-size:14px;outline:none;">
            ${opts}
          </select>
          <input type="text" id="set-hint-custom" placeholder="Type set name..."
            value="${isOther ? savedCustom : ''}"
            oninput="sessionStorage.setItem('cardmint_set_custom', this.value)"
            style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#f1f5f9;font-size:14px;outline:none;margin-top:6px;display:${isOther ? 'block' : 'none'};">
        </div>`;
    }

    function onSetHintChange(val) {
      sessionStorage.setItem('cardmint_set_hint', val);
      const custom = document.getElementById('set-hint-custom');
      if (custom) {
        custom.style.display = val === 'Other (type below)' ? 'block' : 'none';
        if (val !== 'Other (type below)') custom.value = '';
      }
    }

    function publicToggleHtml() {
      const savedPublic = sessionStorage.getItem('cardmint_is_public') === 'true';
      return `
        <label style="display:flex; align-items:center; gap:10px; margin-top:4px; font-size:13px; color:#cbd5e1; cursor:pointer;"
          onclick="const cb=document.getElementById('is-public-toggle');cb.checked=!cb.checked;sessionStorage.setItem('cardmint_is_public',cb.checked);this.querySelector('.ptoggle').classList.toggle('pton',cb.checked);">
          <div class="ptoggle ${savedPublic ? 'pton' : ''}" style="position:relative;width:44px;height:24px;background:${savedPublic ? '#3b82f6' : '#475569'};border-radius:12px;transition:background .2s;flex-shrink:0;">
            <div style="position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;${savedPublic ? 'transform:translateX(20px);' : ''}"></div>
          </div>
          <input type="checkbox" id="is-public-toggle" ${savedPublic ? 'checked' : ''} style="display:none;">
          <span>Make this card public (visible in Card Collection)</span>
        </label>`;
    }

    // ── Live Camera Scanner ──────────────────────────────────────────────────

    let cameraStream = null;
    let cameraSide = null;  // 'front' or 'back'
    let facingMode = 'environment';

    async function openCamera(side) {
      cameraSide = side;
      useScanMode = true;
      const video = document.getElementById('camera-video');
      const overlay = document.getElementById('camera-overlay');
      const label = document.getElementById('camera-label');
      label.textContent = `Position card ${side} inside the frame`;

      try {
        if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = cameraStream;
        overlay.classList.remove('hidden');
      } catch (err) {
        // Camera not available — fall back to file input
        document.getElementById(side + '-camera').click();
      }
    }

    async function flipCamera() {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        const video = document.getElementById('camera-video');
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = cameraStream;
      }
    }

    function captureFromCamera() {
      const video = document.getElementById('camera-video');
      const fullCanvas = document.createElement('canvas');
      fullCanvas.width = video.videoWidth;
      fullCanvas.height = video.videoHeight;
      const ctx = fullCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      // Crop to the guide area (matches the CSS: 15% inset, 70% wide, 60% tall)
      const cropX = Math.round(video.videoWidth * 0.15);
      const cropY = Math.round(video.videoHeight * 0.15);
      const cropW = Math.round(video.videoWidth * 0.70);
      const cropH = Math.round(video.videoHeight * 0.60);

      const cropCanvas = document.createElement('canvas');
      cropCanvas.width = cropW;
      cropCanvas.height = cropH;
      const cropCtx = cropCanvas.getContext('2d');
      cropCtx.drawImage(fullCanvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

      cropCanvas.toBlob(blob => {
        const file = new File([blob], cameraSide + '.jpg', { type: 'image/jpeg' });
        if (cameraSide === 'front') {
          frontFile = file;
          state = 'front-captured';
        } else {
          backFile = file;
          state = 'back-captured';
        }
        closeCamera();
        render();
      }, 'image/jpeg', 0.92);
    }

    function closeCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      document.getElementById('camera-overlay').classList.add('hidden');
    }

    // ── State helpers ────────────────────────────────────────────────────────

    function setDots(step) {
      [1,2,3].forEach(i => {
        const d = document.getElementById('dot-' + i);
        if (d) d.className = 'step-dot' + (i < step ? ' done' : i === step ? ' active' : '');
      });
    }

    function objectUrl(file) { return file ? URL.createObjectURL(file) : ''; }

    // Source selection buttons (camera vs. file)
    function sourceButtons(side) {
      if (isMobile) {
        return `
          <div class="flex gap-3 w-full">
            <div class="source-btn" onclick="openCamera('${side}')">
              <span class="text-3xl">📸</span>
              <span class="text-sm font-medium">Scan Card</span>
              <span class="text-[10px] text-slate-400">Live camera</span>
            </div>
            <div class="source-btn" onclick="document.getElementById('${side}-camera').click()">
              <span class="text-3xl">📷</span>
              <span class="text-sm font-medium">Take Photo</span>
            </div>
            <div class="source-btn" onclick="document.getElementById('${side}-file').click()">
              <span class="text-3xl">🖼️</span>
              <span class="text-sm font-medium">Library</span>
            </div>
          </div>`;
      } else {
        return `
          <div class="flex gap-3 w-full">
            <div class="source-btn" onclick="openCamera('${side}')">
              <span class="text-3xl">📸</span>
              <span class="text-sm font-medium">Scan with Webcam</span>
              <span class="text-[10px] text-slate-400">Live camera</span>
            </div>
            <div class="source-btn" onclick="document.getElementById('${side}-file').click()">
              <span class="text-3xl">📁</span>
              <span class="text-sm font-medium">Choose from Files</span>
            </div>
          </div>`;
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────

    function render() {
      const el = document.getElementById('main-content');

      if (state === 'initial') {
        setDots(1);
        el.innerHTML = `
          <div class="flex flex-col items-center gap-6 mt-6">
            <div class="text-center">
              <div class="text-5xl mb-3">📸</div>
              <h2 class="text-xl font-semibold">Scan Card Front</h2>
              <p class="text-slate-400 text-sm mt-1">Take a photo or choose from your files</p>
            </div>
            ${setDropdownHtml()}
            <div class="w-full rounded-xl border-2 border-dashed border-slate-600 flex items-center justify-center" style="min-height:160px">
              <span class="text-slate-500 text-sm">Front image will appear here</span>
            </div>
            ${sourceButtons('front')}
          </div>`;

      } else if (state === 'front-captured') {
        setDots(2);
        el.innerHTML = `
          <div class="flex flex-col items-center gap-5 mt-4">
            <div class="text-center">
              <div class="text-5xl mb-2">&#10003;</div>
              <h2 class="text-xl font-semibold">Front Captured!</h2>
              <p class="text-slate-400 text-sm mt-1">Now scan the back of the card</p>
            </div>
            ${setDropdownHtml()}
            <img id="front-preview" src="${objectUrl(frontFile)}" class="preview-img" alt="Card front">
            <button onclick="frontFile=null;state='initial';render()"
              class="text-slate-400 hover:text-white text-xs underline">Retake Front</button>
            ${sourceButtons('back')}
          </div>`;

      } else if (state === 'back-captured') {
        setDots(3);
        el.innerHTML = `
          <div class="flex flex-col items-center gap-4 mt-4">
            <div class="text-center">
              <h2 class="text-xl font-semibold">Ready to Submit</h2>
              <p class="text-slate-400 text-sm mt-1">Review both images, then upload</p>
            </div>
            ${setDropdownHtml()}
            <div class="grid grid-cols-2 gap-3 w-full">
              <div>
                <p class="text-xs text-slate-400 mb-1 text-center">FRONT</p>
                <img src="${objectUrl(frontFile)}" class="preview-img" style="max-height:22vh" alt="Front">
                <button onclick="frontFile=null;state='initial';render()"
                  class="block mx-auto mt-1 text-slate-400 hover:text-white text-xs underline">Replace</button>
              </div>
              <div>
                <p class="text-xs text-slate-400 mb-1 text-center">BACK</p>
                <img src="${objectUrl(backFile)}" class="preview-img" style="max-height:22vh" alt="Back">
                <button onclick="backFile=null;state='front-captured';render()"
                  class="block mx-auto mt-1 text-slate-400 hover:text-white text-xs underline">Replace</button>
              </div>
            </div>
            ${publicToggleHtml()}
            <button onclick="uploadCard()"
              class="w-full py-4 rounded-2xl bg-green-600 hover:bg-green-500 active:bg-green-700 font-semibold text-lg transition-colors mt-2">
              Upload &amp; Analyze
            </button>
          </div>`;

      } else if (state === 'uploading') {
        document.getElementById('step-dots').innerHTML = '';
        el.innerHTML = `
          <div class="flex flex-col items-center justify-center gap-6 mt-16">
            <svg class="spinner w-14 h-14 text-blue-500" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="32" stroke-dashoffset="10"/>
            </svg>
            <div class="text-center">
              <h2 class="text-xl font-semibold">Uploading...</h2>
              <p class="text-slate-400 text-sm mt-1">Sending card to be analyzed</p>
            </div>
          </div>`;

      } else if (state === 'complete') {
        document.getElementById('step-dots').innerHTML = '';
        el.innerHTML = `
          <div class="flex flex-col items-center gap-6 mt-10 text-center">
            <div class="text-6xl">&#127881;</div>
            <div>
              <h2 class="text-2xl font-bold">Card Uploaded!</h2>
              <p class="text-slate-400 text-sm mt-2">Claude is analyzing your card.<br>It will be ready in the dashboard shortly.</p>
            </div>
            <div class="bg-slate-800 rounded-xl px-5 py-3 w-full">
              <p class="text-xs text-slate-400 mb-1">Card ID</p>
              <p class="font-mono text-xs text-blue-400 break-all">${resultCardId}</p>
            </div>
            <div class="flex flex-col gap-3 w-full">
              <button onclick="resetScanner()" class="w-full py-4 rounded-2xl bg-blue-600 hover:bg-blue-500 font-semibold text-lg transition-colors">
                Scan Another Card
              </button>
              <a href="/collection" class="block w-full py-3 rounded-2xl bg-slate-700 hover:bg-slate-600 font-medium text-center transition-colors">
                View Dashboard
              </a>
            </div>
          </div>`;

      } else if (state === 'error') {
        document.getElementById('step-dots').innerHTML = '';
        el.innerHTML = `
          <div class="flex flex-col items-center gap-6 mt-10 text-center">
            <div class="text-6xl">&#10060;</div>
            <div>
              <h2 class="text-2xl font-bold">Upload Failed</h2>
              <p class="text-slate-400 text-sm mt-2" id="error-msg"></p>
            </div>
            <button onclick="resetScanner()" class="w-full py-4 rounded-2xl bg-blue-600 font-semibold text-lg">
              Try Again
            </button>
          </div>`;
      }
    }

    // ── Actions ──────────────────────────────────────────────────────────────

    function resetScanner() {
      frontFile = null; backFile = null; resultCardId = null;
      state = 'initial';
      document.getElementById('step-dots').innerHTML = `
        <div class="step-dot active" id="dot-1"></div>
        <div class="step-dot" id="dot-2"></div>
        <div class="step-dot" id="dot-3"></div>`;
      render();
    }

    async function uploadCard() {
      state = 'uploading';
      render();
      try {
        const form = new FormData();
        if (frontFile) form.append('front_image', frontFile, 'front.jpg');
        if (backFile)  form.append('back_image',  backFile,  'back.jpg');
        // Send set hint and public toggle
        let setHint = document.getElementById('set-hint')?.value || sessionStorage.getItem('cardmint_set_hint') || '';
        if (setHint === 'Other (type below)') {
          setHint = document.getElementById('set-hint-custom')?.value || sessionStorage.getItem('cardmint_set_custom') || '';
        }
        const isPublic = document.getElementById('is-public-toggle')?.checked || sessionStorage.getItem('cardmint_is_public') === 'true';
        form.append('set_hint', setHint);
        form.append('is_public', isPublic ? 'true' : 'false');
        const url = useScanMode ? `${API_BASE}/api/cards/upload?scan_mode=true` : `${API_BASE}/api/cards/upload`;
        const res = await fetch(url, { method: 'POST', body: form });
        if (res.status === 401) {
          window.location.href = '/login';
          return;
        }
        if (res.status === 403) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Card limit reached. Upgrade your account to scan more cards.');
        }
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        resultCardId = data.card_id;
        state = 'complete';
      } catch (err) {
        state = 'error';
        render();
        const msg = document.getElementById('error-msg');
        if (msg) msg.textContent = err.message || 'Unknown error. Please try again.';
        return;
      }
      render();
    }

    // ── File input listeners (camera + file picker, for front + back) ──────

    ['front-camera', 'front-file'].forEach(inputId => {
      document.getElementById(inputId).addEventListener('change', e => {
        const file = e.target.files[0];
        if (file) { frontFile = file; state = 'front-captured'; render(); }
        e.target.value = '';
      });
    });

    ['back-camera', 'back-file'].forEach(inputId => {
      document.getElementById(inputId).addEventListener('change', e => {
        const file = e.target.files[0];
        if (file) { backFile = file; state = 'back-captured'; render(); }
        e.target.value = '';
      });
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
